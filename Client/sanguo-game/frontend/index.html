<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三国朝堂</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="/static/css/animations.css" />
</head>
<body>

<!-- ════════════════════════════════════════════════════════ -->
<!--  开局界面                                                  -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="screen-setup" class="screen">
  <div class="setup-bg">
    <h1 class="game-title">三国朝堂</h1>
    <p class="game-subtitle">公元208年，赤壁前夕，天下三分之局正在成形……</p>

    <div class="setup-card">
      <!-- 君主名 -->
      <section class="setup-section">
        <h2>一、赐名</h2>
        <input id="ruler-name" type="text" placeholder="请输入您的名号" maxlength="8" />
      </section>

      <!-- Buff选择 -->
      <section class="setup-section">
        <h2>二、起始福泽（选择2项）</h2>
        <div id="buff-list" class="card-grid"></div>
      </section>

      <!-- 大臣选择 -->
      <section class="setup-section">
        <h2>三、择贤任能（内政/军事/外交各选一）</h2>
        <div id="minister-candidates" class="minister-grid"></div>
      </section>

      <button id="btn-start-game" class="btn-primary" disabled>开创基业</button>
      <p id="setup-error" class="error-text"></p>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════ -->
<!--  朝堂主界面                                                -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="screen-court" class="screen hidden">
  <div class="court-layout">

    <!-- 左侧：大臣面板 -->
    <aside class="minister-panel">
      <h3>朝臣</h3>
      <div id="minister-list"></div>

      <div class="phase-indicator">
        <span>当前阶段：</span>
        <strong id="phase-display">待机</strong>
      </div>
    </aside>

    <!-- 中央：聊天区 -->
    <main class="chat-area">
      <div id="chat-messages" class="chat-messages"></div>

      <div class="chat-input-bar">
        <select id="minister-select" class="minister-select">
          <option value="internal">内政大臣</option>
          <option value="military">军事大臣</option>
          <option value="diplomacy">外交大臣</option>
        </select>
        <input id="chat-input" type="text" placeholder="向大臣问询……" />
        <button id="btn-send" class="btn-secondary">发言</button>
      </div>

      <!-- 朝会控制 -->
      <div class="court-controls">
        <button id="btn-kai-chao" class="btn-primary">鸣鞭上朝</button>
        <button id="btn-yishi" class="btn-secondary hidden">进入议事</button>
        <button id="btn-nizhi" class="btn-secondary hidden">拟旨</button>
        <button id="btn-tui-chao" class="btn-danger hidden">退朝结算</button>
      </div>

      <!-- 拟旨输入框 -->
      <div id="decree-area" class="decree-area hidden">
        <textarea id="decree-input" placeholder="请输入旨意……（例：训练精兵两千，加强城防）"></textarea>
        <button id="btn-issue-decree" class="btn-primary">颁旨</button>
      </div>
    </main>

    <!-- 右侧：资源面板 + 地图入口 -->
    <aside class="resource-panel">
      <h3 id="date-display">公元208年秋</h3>
      <div class="resource-grid">
        <div class="res-item"><span class="res-label">兵力</span><span id="res-troops" class="res-val">10000</span></div>
        <div class="res-item"><span class="res-label">钱粮</span><span id="res-gold" class="res-val">1000</span></div>
        <div class="res-item"><span class="res-label">军粮</span><span id="res-food" class="res-val">5000</span></div>
        <div class="res-item"><span class="res-label">声望</span><span id="res-prestige" class="res-val">30</span></div>
      </div>

      <button id="btn-map" class="btn-secondary mt-12">查看舆图</button>
    </aside>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════ -->
<!--  周报弹窗                                                  -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="modal-report" class="modal hidden">
  <div class="modal-scroll">
    <div class="modal-header">
      <h2>周报 · <span id="report-date"></span></h2>
    </div>
    <div id="report-content" class="report-content"></div>
    <div class="modal-footer">
      <button id="btn-close-report" class="btn-primary">明日再朝</button>
    </div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════ -->
<!--  地图弹窗                                                  -->
<!-- ════════════════════════════════════════════════════════ -->
<div id="modal-map" class="modal hidden">
  <div class="modal-scroll modal-wide">
    <div class="modal-header">
      <h2>天下舆图</h2>
      <button id="btn-close-map" class="btn-close">✕</button>
    </div>
    <div id="map-container"></div>
  </div>
</div>

<!-- 加载遮罩 -->
<div id="loading-mask" class="loading-mask hidden">
  <div class="loading-spinner"></div>
  <p id="loading-text">稍候……</p>
</div>

<script src="/static/js/app.js"></script>
<script src="/static/js/setup.js"></script>
<script src="/static/js/court.js"></script>
<script src="/static/js/world_map.js"></script>
</body>
</html>
